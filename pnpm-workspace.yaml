# Flat node_modules so Expo/Metro can resolve hoisted deps (pnpm 11 reads this here, not .npmrc).
nodeLinker: hoisted

packages:
  - "apps/*"
  - "packages/*"

# Single source of truth for dependency versions across the workspace.
# Packages reference these with "catalog:".
catalog:
  # Toolchain
  typescript: ^6.0.3
  "@types/node": ^22.10.0
  turbo: ^2.9.18
  "@biomejs/biome": ^2.5.0
  lefthook: ^2.1.9

  # React / Next
  react: ^19.2.7
  react-dom: ^19.2.7
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  next: ^16.2.9

  # Schema / forms — zod v4 (one copy across the workspace).
  zod: ^4.4.3
  react-hook-form: ^7.80.0
  "@hookform/resolvers": ^5.4.0

  # Data / http
  ky: ^2.0.2
  "@tanstack/react-query": ^5.101.0

  # UI / Tailwind v4
  tailwindcss: ^4.3.1
  "@tailwindcss/postcss": ^4.3.1
  "@tailwindcss/vite": ^4.3.1
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  class-variance-authority: ^0.7.1
  lucide-react: ^1.21.0

  # Bridge
  "@webview-bridge/web": ^1.7.9
  "@webview-bridge/react-native": ^1.7.9
  "@webview-bridge/react": ^1.7.9
  "@webview-bridge/types": ^1.7.9

  # State
  zustand: ^5.0.14

  # Monitoring
  "@sentry/nextjs": ^10.61.0

  # Test
  vitest: ^4.1.9
  "@playwright/test": ^1.61.0
  jsdom: ^29.1.1

  # Dead code detection
  knip: ^6.23.0

  # Storybook / Vite tooling (@repo/ui)
  storybook: ^10.4.6
  "@storybook/react": ^10.4.6
  "@storybook/react-vite": ^10.4.6
  vite: ^8.0.16
  "@vitejs/plugin-react": ^6.0.2
  chromatic: ^17.8.0

# Packages allowed to run install/build lifecycle scripts (pnpm 11+).
allowBuilds:
  "@sentry/cli": true
  dtrace-provider: false
  esbuild: true
  lefthook: true
  sharp: true

minimumReleaseAgeExclude:
  - '@sentry/browser-utils@10.61.0'
  - '@sentry/browser@10.61.0'
  - '@sentry/core@10.61.0'
  - '@sentry/feedback@10.61.0'
  - '@sentry/nextjs@10.61.0'
  - '@sentry/node-core@10.61.0'
  - '@sentry/node@10.61.0'
  - '@sentry/opentelemetry@10.61.0'
  - '@sentry/react@10.61.0'
  - '@sentry/replay-canvas@10.61.0'
  - '@sentry/replay@10.61.0'
  - '@sentry/server-utils@10.61.0'
  - '@sentry/vercel-edge@10.61.0'
  - chromatic@17.8.0
